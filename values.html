function fmtCRR(v){if(v>=1000000)return(v/1000000).toFixed(2).replace(/\.?0+$/,'')+'M';if(v>=1000)return(v/1000).toFixed(1).replace(/\.0$/,'')+'K';return String(v);}
function dScore(d){const dl=d.toLowerCase();if(dl.includes('high'))return 4;if(dl.includes('moderate')||dl.includes('medium'))return 3;if(dl.includes('low'))return 2;return 1;}
function dClass(d){const s=dScore(d);if(s>=4)return'dh';if(s===3)return'dm';if(s===2)return'dl';return'dd';}
function tier(c){if(c>=500000)return'S';if(c>=10000)return'A';if(c>=500)return'B';if(c>=20)return'C';return'D';}

  let items=[...DB];
  if(q)items=items.filter(i=>i.name.toLowerCase().includes(q)||i.category.toLowerCase().includes(q));
  if(cat)items=items.filter(i=>i.category===cat);
  if(dem)items=items.filter(i=>{const s=dScore(i.demand);return dem==='high'?s>=4:dem==='mid'?s===3:dem==='low'?s===2:s===1;});
  if(ob==='yes')items=items.filter(i=>i.obtainable);if(ob==='no')items=items.filter(i=>!i.obtainable);
  const sm={crr_desc:(a,b)=>b.crr-a.crr,crr_asc:(a,b)=>a.crr-b.crr,name:(a,b)=>a.name.localeCompare(b.name),demand:(a,b)=>dScore(b.demand)-dScore(a.demand)};
  items.sort(sm[sort]||sm.crr_desc);
  document.getElementById('statsRow').innerHTML=`Showing <span>${items.length}</span> of ${DB.length} items`;

}
